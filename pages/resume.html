<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder — DevOpsHub AI</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="scroll-progress"></div>
<div class="bg-grid"></div>

<nav id="nav">
  <a href="../index.html" class="nav-logo">
    <div class="nav-logo-mark">⚙️</div>
    <span class="nav-logo-text">DevOps<span>Hub</span> AI</span>
  </a>
  <div class="nav-links" id="nav-links">
    <a href="../index.html">Home</a>
    <a href="labs.html">Labs</a>
    <a href="tools.html">Tools</a>
    <a href="generators.html">Generators</a>
    <a href="troubleshoot.html">Troubleshoot</a>
    <a href="roadmap.html">Roadmap</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="interview.html">Interview Prep</a>
    <a href="resume.html" class="active">Resume</a>
    <a href="assistant.html">AI Assistant</a>
  </div>
  <div class="nav-cta">
    <a href="assistant.html" class="btn btn-cyan btn-sm">Launch AI ✦</a>
    <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
  </div>
</nav>

<main>
<div class="page-hero">
  <div class="eyebrow center" style="justify-content:center">Resume Builder</div>
  <h1>Build Your DevOps Resume</h1>
  <p>Fill in the form on the left — see a live preview on the right. Print to PDF when ready.</p>
</div>

<section>
  <div class="wrap">
    <div class="resume-grid reveal">
      <div class="resume-form glass">
        <div class="form-row">
          <label>Full Name</label>
          <input class="form-input" id="r-name" value="Jordan Smith" oninput="renderResume()">
        </div>
        <div class="form-row">
          <label>Title</label>
          <input class="form-input" id="r-title" value="DevOps Engineer" oninput="renderResume()">
        </div>
        <div class="form-grid2">
          <div class="form-row">
            <label>Email</label>
            <input class="form-input" id="r-email" value="jordan@email.com" oninput="renderResume()">
          </div>
          <div class="form-row">
            <label>Phone</label>
            <input class="form-input" id="r-phone" value="+1 555 123 4567" oninput="renderResume()">
          </div>
        </div>
        <div class="form-row">
          <label>Location</label>
          <input class="form-input" id="r-loc" value="Remote / Open to relocate" oninput="renderResume()">
        </div>
        <div class="form-row">
          <label>Summary</label>
          <textarea class="form-textarea" id="r-summary" rows="3" oninput="renderResume()">Results-driven DevOps Engineer with experience automating CI/CD pipelines, managing Kubernetes clusters, and reducing deployment time by 40%.</textarea>
        </div>
        <div class="form-row">
          <label>Skills (comma separated)</label>
          <textarea class="form-textarea" id="r-skills" rows="2" oninput="renderResume()">Docker, Kubernetes, Terraform, AWS, Jenkins, Python, Linux, Ansible, Git, Prometheus</textarea>
        </div>
        <div class="form-row">
          <label>Experience (one per line: Role | Company | Dates | Description)</label>
          <textarea class="form-textarea" id="r-exp" rows="5" oninput="renderResume()">DevOps Engineer | TechCorp | 2023–Present | Built CI/CD pipelines reducing deploy time by 40%. Managed a 30-node Kubernetes cluster.
Junior SysAdmin | StartupXYZ | 2021–2023 | Automated server provisioning with Ansible. Maintained 99.9% uptime SLA.</textarea>
        </div>
        <div class="form-row">
          <label>Education</label>
          <input class="form-input" id="r-edu" value="B.Tech Computer Science — State University, 2021" oninput="renderResume()">
        </div>
        <div class="form-row">
          <label>Certifications (comma separated)</label>
          <input class="form-input" id="r-certs" value="AWS Certified Solutions Architect, CKA" oninput="renderResume()">
        </div>
        <button class="btn btn-cyan btn-block" onclick="window.print()">🖨️ Print / Save as PDF</button>
      </div>

      <div class="resume-preview glass" id="resume-preview"></div>
    </div>
  </div>
</section>

</main>

<footer>
  <div class="footer-bottom" style="border-top:none;justify-content:center">
    <p>© 2026 DevOpsHub AI · <a href="../index.html" style="color:var(--cyan)">Back to Home</a></p>
  </div>
</footer>

<button id="back-top">↑</button>

<style>
@media print {
  nav, .page-hero, .resume-form, footer, #back-top, .bg-grid, #scroll-progress { display: none !important; }
  body { background: #fff !important; }
  .resume-grid { display: block !important; }
  .resume-preview { box-shadow: none !important; max-height: none !important; }
  main { padding-top: 0 !important; }
}
</style>

<script>
function renderResume() {
  const name = document.getElementById('r-name').value;
  const title = document.getElementById('r-title').value;
  const email = document.getElementById('r-email').value;
  const phone = document.getElementById('r-phone').value;
  const loc = document.getElementById('r-loc').value;
  const summary = document.getElementById('r-summary').value;
  const skills = document.getElementById('r-skills').value.split(',').map(s=>s.trim()).filter(Boolean);
  const expLines = document.getElementById('r-exp').value.split('\n').filter(l=>l.trim());
  const edu = document.getElementById('r-edu').value;
  const certs = document.getElementById('r-certs').value.split(',').map(s=>s.trim()).filter(Boolean);

  const expHtml = expLines.map(line => {
    const [role, company, dates, desc] = line.split('|').map(s => (s||'').trim());
    return `
      <div style="margin-bottom:.9rem">
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:.86rem;color:#0a0f1e">
          <span>${role || ''} — ${company || ''}</span><span style="color:#0ea5b8;font-weight:600">${dates || ''}</span>
        </div>
        <p style="margin-top:.2rem">${desc || ''}</p>
      </div>`;
  }).join('');

  document.getElementById('resume-preview').innerHTML = `
    <div class="rp-name">${name}</div>
    <div class="rp-title">${title}</div>
    <div class="rp-contact">${email} · ${phone} · ${loc}</div>

    <div class="rp-section">
      <h4>Summary</h4>
      <p>${summary}</p>
    </div>

    <div class="rp-section">
      <h4>Skills</h4>
      <div>${skills.map(s => `<span class="rp-skill-tag">${s}</span>`).join('')}</div>
    </div>

    <div class="rp-section">
      <h4>Experience</h4>
      ${expHtml}
    </div>

    <div class="rp-section">
      <h4>Education</h4>
      <p>${edu}</p>
    </div>

    ${certs.length ? `<div class="rp-section">
      <h4>Certifications</h4>
      <p>${certs.join(' · ')}</p>
    </div>` : ''}
  `;
}
renderResume();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
