</head>
<body>
<div id="scroll-progress"></div>
<div class="bg-grid"></div>

<nav id="nav">
  <a href="../index.html" class="nav-logo">
    <div class="nav-logo-mark">⚙️</div>
    <span class="nav-logo-text">DevOps<span>Hub</span> AI</span>
  </a>
  <div class="nav-links" id="nav-links">
    <a href="../index.html">Home</a>
    <a href="labs.html">Labs</a>

    <a href="generators.html">Generators</a>

  <div class="nav-cta">
    <a href="assistant.html" class="btn btn-cyan btn-sm">Launch AI ✦</a>
    <button class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></button>
  </div>
</nav>

<main>
<div class="page-hero">
  <div class="eyebrow center" style="justify-content:center">Troubleshooting Center</div>
  <h1>Fix Production Errors Fast</h1>
  <p>19 real-world error guides — symptoms, causes, and fixes.</p>
</div>

<section>
  <div class="wrap">
    <div class="search-bar reveal">
      <input type="text" id="ts-search" placeholder="Search errors… e.g. CrashLoopBackOff, port already in use" oninput="renderTS()">
    </div>
    <div class="ts-filters reveal">
      <button class="chip active" data-cat="all" onclick="setTSFilter(this)">All</button>
      <button class="chip" data-cat="docker" onclick="setTSFilter(this)">🐳 Docker</button>
      <button class="chip" data-cat="kubernetes" onclick="setTSFilter(this)">☸️ Kubernetes</button>
      <button class="chip" data-cat="linux" onclick="setTSFilter(this)">🐧 Linux</button>
      <button class="chip" data-cat="jenkins" onclick="setTSFilter(this)">⚙️ Jenkins</button>
      <button class="chip" data-cat="git" onclick="setTSFilter(this)">📦 Git</button>
      <button class="chip" data-cat="aws" onclick="setTSFilter(this)">☁️ AWS</button>
      <button class="chip" data-cat="terraform" onclick="setTSFilter(this)">🏗️ Terraform</button>
    </div>
    <div id="ts-results"></div>
  </div>
</section>

</main>

<footer>
  <div class="footer-bottom" style="border-top:none;justify-content:center">
    <p>© 2026 DevOpsHub AI · <a href="../index.html" style="color:var(--cyan)">Back to Home</a></p>
  </div>
</footer>

<button id="back-top">↑</button>

<script src="../data/troubleshoot.js"></script>
<script>
let tsCategory = 'all';

function setTSFilter(el) {
  document.querySelectorAll('.ts-filters .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  tsCategory = el.dataset.cat;
  renderTS();
}

function renderTS() {
  const q = document.getElementById('ts-search').value;
  const results = searchTroubleshoot(q, tsCategory);
  const container = document.getElementById('ts-results');
  if (!results.length) {
    container.innerHTML = `<div class="center" style="padding:3rem;color:var(--muted)">No matching errors found.</div>`;
    return;
  }
  container.innerHTML = results.map(t => `
    <div class="ts-card glass reveal in">
      <div class="ts-head">
        <span class="ts-icon">${t.icon}</span>
        <span class="ts-title">${t.title}</span>
        <span class="badge badge-cyan" style="margin-left:auto">${t.cat}</span>
      </div>
      <div class="ts-symptom">⚠️ ${t.symptom}</div>
      <div class="ts-causes">
        <h5>Common Causes</h5>
        <ul>${t.causes.map(c => `<li>${c}</li>`).join('')}</ul>
      </div>
      <div class="ts-fix">
        <h5 style="color:var(--green);margin-bottom:.4rem">✓ Fix</h5>
        ${t.fix}
      </div>
    </div>
  `).join('');
}
renderTS();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
