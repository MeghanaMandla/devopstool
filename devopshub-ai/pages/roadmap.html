<script>
function renderRoadmap() {
  document.getElementById('roadmap-line').innerHTML = ROADMAP_NODES.map((n, i) => `
    <div class="roadmap-node reveal" onclick="this.classList.toggle('open')">
      <div class="roadmap-marker">${n.icon}</div>
      <div class="roadmap-content">
        <div class="roadmap-step">STEP ${String(i+1).padStart(2,'0')}</div>
        <div class="roadmap-title">${n.title}</div>
        <div style="font-size:.85rem;color:var(--muted);margin-top:.4rem">${n.desc}</div>
        <div class="roadmap-detail">
          <h5>📚 Learning Resources</h5>
          <ul>${n.resources.map(r => `<li>${r}</li>`).join('')}</ul>
          <h5>🛠️ Practice Projects</h5>
          <ul>${n.projects.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
      </div>
    </div>
  `).join('');

  // re-attach reveal observer for dynamically added nodes
  const obs = new IntersectionObserver(entries => {
    entries.forEach((e,i) => {
      if (e.isIntersecting) { setTimeout(()=>e.target.classList.add('in'), i*60); obs.unobserve(e.target); }
    });
  }, { threshold: .1 });
  document.querySelectorAll('.roadmap-node.reveal').forEach(el => obs.observe(el));
}
renderRoadmap();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
